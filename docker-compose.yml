version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ph_postgres_dev
    restart: unless-stopped
    environment:
      # Varsayılan: Bizmo.HRPDR (nokta içeren ad Docker giriş noktasında tırnaklı oluşturulur)
      POSTGRES_DB: ${POSTGRES_DB:-Bizmo.HRPDR}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Bizmo.2025*}
    ports:
      - "4455:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ph_redis_dev
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispassword}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
